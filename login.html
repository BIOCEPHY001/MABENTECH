<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(content=~{::main-content}, extraHead=~{::extra-head}, extraScripts=~{::extra-scripts})}">
<head><th:block th:fragment="extra-head"><title>Sign In – MABENTECH</title></th:block></head>
<body>
<th:block th:fragment="main-content">
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <a href="/" style="display:inline-flex;align-items:center;gap:.6rem;text-decoration:none">
                <div class="logo-icon"><i class="fas fa-microchip"></i></div>
                <span style="font-family:var(--font-display);font-size:1.2rem;font-weight:800;color:var(--text)">MABENTECH</span>
            </a>
        </div>
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Sign in to your MABENTECH account</p>

        <div th:if="${param.error}" class="alert alert-error">
            <i class="fas fa-exclamation-circle"></i> Invalid email or password. Please try again.
        </div>
        <div th:if="${param.logout}" class="alert alert-info">
            <i class="fas fa-check-circle"></i> You have been signed out successfully.
        </div>

        <form action="/login" method="POST">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input class="form-input" type="email" id="email" name="email"
                       placeholder="you@example.com" required autofocus/>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">
                    Password
                    <a href="#" style="float:right;font-size:.75rem;color:var(--accent);font-weight:500;text-transform:none;letter-spacing:0">Forgot password?</a>
                </label>
                <div style="position:relative">
                    <input class="form-input" type="password" id="password" name="password"
                           placeholder="Enter your password" required style="padding-right:2.8rem"/>
                    <button type="button" onclick="togglePw()" style="position:absolute;right:.8rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:.9rem">
                        <i class="fas fa-eye" id="pwEye"></i>
                    </button>
                </div>
            </div>
            <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:1.25rem">
                <input type="checkbox" id="remember" name="remember-me" style="accent-color:var(--accent)"/>
                <label for="remember" style="font-size:.85rem;color:var(--text2);cursor:pointer">Keep me signed in</label>
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-lg">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>

        <div class="auth-divider">or continue with</div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.5rem">
            <button class="btn btn-outline" onclick="showToast('<i class=\'fab fa-google\'></i> Google sign-in coming soon')">
                <i class="fab fa-google"></i> Google
            </button>
            <button class="btn btn-outline" onclick="showToast('<i class=\'fab fa-github\'></i> GitHub sign-in coming soon')">
                <i class="fab fa-github"></i> GitHub
            </button>
        </div>

        <p class="auth-link">Don't have an account? <a href="/register">Create one free</a></p>
    </div>
</div>
</th:block>
<th:block th:fragment="extra-scripts">
<script>
function togglePw() {
    const inp = document.getElementById('password');
    const eye = document.getElementById('pwEye');
    if (inp.type === 'password') { inp.type = 'text'; eye.className = 'fas fa-eye-slash'; }
    else { inp.type = 'password'; eye.className = 'fas fa-eye'; }
}
</script>
</th:block>
</body>
</html>
