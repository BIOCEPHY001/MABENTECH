# =============================================
# MABENTECH — Production Configuration
# Used when SPRING_PROFILES_ACTIVE=prod
# =============================================

# Server — Railway injects $PORT automatically
server.port=${PORT:8080}
server.error.whitelabel.enabled=false

# Application
spring.application.name=MABENTECH
app.name=MABENTECH
app.base-url=${APP_BASE_URL:https://mabentech.up.railway.app}

# ── DATABASE ──────────────────────────────────
# Railway PostgreSQL (set these in Railway dashboard env vars)
# If DATABASE_URL is set by Railway, Spring Boot auto-configures it
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:mabentech;DB_CLOSE_DELAY=-1}
spring.datasource.username=${PGUSER:sa}
spring.datasource.password=${PGPASSWORD:}

# Auto-detect driver from URL
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}

# On first deploy use 'create', then switch to 'validate' or 'update'
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:create}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Disable H2 console in production
spring.h2.console.enabled=false

# ── THYMELEAF ─────────────────────────────────
spring.thymeleaf.cache=true
spring.thymeleaf.encoding=UTF-8

# ── JWT ───────────────────────────────────────
app.jwt.secret=${JWT_SECRET:MabenTechProdSecretKeyMustBeChangedInRailwayEnvVars2025!}
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# ── SESSION SECURITY ──────────────────────────
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict
server.servlet.session.timeout=30m

# ── LOGGING ───────────────────────────────────
logging.level.com.mabentech=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN

# ── ACTUATOR ──────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
