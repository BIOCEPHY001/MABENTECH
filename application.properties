# =============================================
# MABENTECH - Application Configuration
# =============================================

# Server
server.port=8080
server.servlet.context-path=/
server.error.whitelabel.enabled=false

# HTTPS (production - enable with proper keystore)
# server.ssl.enabled=true
# server.ssl.key-store=classpath:keystore.p12
# server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD}
# server.ssl.key-store-type=PKCS12

# Application
spring.application.name=MABENTECH
app.name=MABENTECH
app.tagline=The Future of Laptops, Delivered Globally
app.base-url=http://localhost:8080

# Database (H2 for dev; swap to PostgreSQL in prod)
spring.datasource.url=jdbc:h2:mem:mabentech;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# JWT Security
app.jwt.secret=MabenTechSuperSecretKeyForJWT2025GlobalLaptopStore!Secure#256bits
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# Security Headers
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict

# Logging
logging.level.com.mabentech=INFO
logging.level.org.springframework.security=WARN

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
