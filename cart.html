<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(content=~{::main-content}, extraHead=~{::extra-head}, extraScripts=~{::extra-scripts})}">
<head><th:block th:fragment="extra-head"><title>Your Cart – MABENTECH</title></th:block></head>
<body>
<th:block th:fragment="main-content">
<div class="page-header">
    <div class="page-header-inner">
        <div class="breadcrumb"><a href="/">Home</a><span class="breadcrumb-sep">›</span><span>Cart</span></div>
        <h1>Shopping Cart</h1>
    </div>
</div>
<div style="max-width:1280px;margin:0 auto;padding:2.5rem 1.5rem">
    <div id="cartPageContent" style="display:grid;grid-template-columns:1fr 360px;gap:2rem;align-items:start">
        <!-- Items -->
        <div>
            <div id="cartPageItems"></div>
            <a href="/shop" class="btn btn-outline" style="margin-top:1rem">
                <i class="fas fa-arrow-left"></i> Continue Shopping
            </a>
        </div>
        <!-- Summary -->
        <div id="cartPageSummary"></div>
    </div>
    <div id="cartPageEmpty" style="display:none;text-align:center;padding:5rem 2rem;color:var(--text3)">
        <i class="fas fa-shopping-bag" style="font-size:4rem;display:block;margin-bottom:1.25rem;color:var(--surface3)"></i>
        <h2 style="color:var(--text2);margin-bottom:.5rem">Your cart is empty</h2>
        <p style="margin-bottom:1.5rem">Discover our premium laptops and accessories.</p>
        <a href="/shop" class="btn btn-primary btn-lg"><i class="fas fa-laptop"></i> Shop Now</a>
    </div>
</div>
</th:block>
<th:block th:fragment="extra-scripts">
<script>
document.addEventListener('DOMContentLoaded', renderCartPage);
function renderCartPage() {
    const cart = JSON.parse(localStorage.getItem('mbt_cart') || '[]');
    const itemsEl = document.getElementById('cartPageItems');
    const summaryEl = document.getElementById('cartPageSummary');
    const emptyEl = document.getElementById('cartPageEmpty');
    const contentEl = document.getElementById('cartPageContent');
    if (!cart.length) {
        contentEl.style.display = 'none';
        emptyEl.style.display = 'block';
        return;
    }
    const emojiMap = { keyboard:'⌨️', mouse:'🖱️', monitor:'🖥️', storage:'💾', dock:'🔌', bag:'👜', charger:'⚡' };
    itemsEl.innerHTML = `
        <div style="background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden">
            <div style="padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:1rem">
                <span>Product</span><span>Price</span><span>Qty</span><span>Total</span><span></span>
            </div>
            ${cart.map(item => `
            <div style="padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:1rem;align-items:center">
                <div style="display:flex;align-items:center;gap:1rem">
                    <div style="width:56px;height:56px;background:var(--surface2);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:1.75rem;flex-shrink:0">💻</div>
                    <div>
                        <div style="font-size:.7rem;color:var(--accent);font-weight:700;text-transform:uppercase;margin-bottom:.15rem">${item.brand}</div>
                        <div style="font-weight:600;font-size:.9rem">${item.name}</div>
                    </div>
                </div>
                <div style="font-weight:600">$${parseFloat(item.price).toFixed(2)}</div>
                <div style="display:flex;align-items:center;gap:.4rem">
                    <button class="qty-btn" onclick="changeQty(${item.id},-1);renderCartPage()">−</button>
                    <span style="font-weight:600;min-width:20px;text-align:center">${item.qty}</span>
                    <button class="qty-btn" onclick="changeQty(${item.id},1);renderCartPage()">+</button>
                </div>
                <div style="font-weight:700;color:var(--accent)">$${(item.price*item.qty).toFixed(2)}</div>
                <button onclick="removeFromCart(${item.id});renderCartPage()" style="color:var(--text3);background:none;border:none;cursor:pointer;font-size:.9rem;transition:color .2s" onmouseover="this.style.color='var(--accent2)'" onmouseout="this.style.color='var(--text3)'">
                    <i class="fas fa-trash-alt"></i>
                </button>
            </div>`).join('')}
        </div>`;
    const subtotal = cart.reduce((s,i) => s + i.price*i.qty, 0);
    const shipping = subtotal >= 500 ? 0 : 29.99;
    const tax = subtotal * 0.07;
    const total = subtotal + shipping + tax;
    summaryEl.innerHTML = `
        <div style="background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;position:sticky;top:90px">
            <h3 style="margin-bottom:1.25rem;font-size:1.1rem">Order Summary</h3>
            <div style="display:flex;flex-direction:column;gap:.75rem;margin-bottom:1.25rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border)">
                <div style="display:flex;justify-content:space-between;font-size:.9rem;color:var(--text2)">
                    <span>Subtotal (${cart.reduce((s,i)=>s+i.qty,0)} items)</span><span>$${subtotal.toFixed(2)}</span>
                </div>
                <div style="display:flex;justify-content:space-between;font-size:.9rem;color:var(--text2)">
                    <span>Shipping</span><span>${shipping===0?'<span style="color:var(--accent3)">Free</span>':'$'+shipping.toFixed(2)}</span>
                </div>
                <div style="display:flex;justify-content:space-between;font-size:.9rem;color:var(--text2)">
                    <span>Tax (7%)</span><span>$${tax.toFixed(2)}</span>
                </div>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:1.1rem;font-weight:800;margin-bottom:1.25rem">
                <span>Total</span><span>$${total.toFixed(2)}</span>
            </div>
            <a href="/checkout" class="btn btn-primary btn-full btn-lg" style="justify-content:center;margin-bottom:.75rem">
                <i class="fas fa-lock"></i> Proceed to Checkout
            </a>
            <div style="display:flex;justify-content:center;gap:.75rem;margin-top:.75rem">
                <i class="fab fa-cc-visa" style="font-size:1.5rem;color:var(--text3)"></i>
                <i class="fab fa-cc-mastercard" style="font-size:1.5rem;color:var(--text3)"></i>
                <i class="fab fa-cc-paypal" style="font-size:1.5rem;color:var(--text3)"></i>
                <i class="fab fa-apple-pay" style="font-size:1.5rem;color:var(--text3)"></i>
            </div>
        </div>`;
}
</script>
</th:block>
</body>
</html>
