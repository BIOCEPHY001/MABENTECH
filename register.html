<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(content=~{::main-content}, extraHead=~{::extra-head}, extraScripts=~{::extra-scripts})}">
<head><th:block th:fragment="extra-head"><title>Create Account – MABENTECH</title></th:block></head>
<body>
<th:block th:fragment="main-content">
<div class="auth-page">
    <div class="auth-card" style="max-width:500px">
        <div class="auth-logo">
            <a href="/" style="display:inline-flex;align-items:center;gap:.6rem;text-decoration:none">
                <div class="logo-icon"><i class="fas fa-microchip"></i></div>
                <span style="font-family:var(--font-display);font-size:1.2rem;font-weight:800;color:var(--text)">MABENTECH</span>
            </a>
        </div>
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Join 50,000+ tech enthusiasts worldwide</p>

        <form id="registerForm" action="/auth/register" method="POST" onsubmit="return validateRegister(event)">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">
                <div class="form-group">
                    <label class="form-label">First Name</label>
                    <input class="form-input" type="text" name="firstName" placeholder="John" required/>
                </div>
                <div class="form-group">
                    <label class="form-label">Last Name</label>
                    <input class="form-input" type="text" name="lastName" placeholder="Doe" required/>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input class="form-input" type="email" name="email" id="regEmail"
                       placeholder="you@example.com" required/>
            </div>

            <div class="form-group">
                <label class="form-label">Country</label>
                <select class="form-input" name="country">
                    <option value="">Select your country</option>
                    <option>United States</option><option>United Kingdom</option>
                    <option>Nigeria</option><option>Canada</option>
                    <option>Australia</option><option>Germany</option>
                    <option>France</option><option>India</option>
                    <option>Japan</option><option>South Africa</option>
                    <option>UAE</option><option>Singapore</option>
                    <option>Brazil</option><option>Mexico</option>
                    <option>Other</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <div style="position:relative">
                    <input class="form-input" type="password" name="password" id="regPw"
                           placeholder="Min. 8 characters" required style="padding-right:2.8rem"/>
                    <button type="button" onclick="toggleRegPw()" style="position:absolute;right:.8rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer">
                        <i class="fas fa-eye" id="regPwEye"></i>
                    </button>
                </div>
                <div id="pwStrength" style="display:flex;gap:4px;margin-top:.4rem">
                    <div class="pw-bar"></div><div class="pw-bar"></div>
                    <div class="pw-bar"></div><div class="pw-bar"></div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <input class="form-input" type="password" name="confirmPassword" id="regPw2"
                       placeholder="Repeat your password" required/>
                <div class="form-error" id="pwMatchErr" style="display:none">
                    <i class="fas fa-times-circle"></i> Passwords do not match
                </div>
            </div>

            <div style="display:flex;align-items:flex-start;gap:.5rem;margin-bottom:1.25rem">
                <input type="checkbox" id="terms" required style="margin-top:.2rem;accent-color:var(--accent)"/>
                <label for="terms" style="font-size:.83rem;color:var(--text2);cursor:pointer;line-height:1.5">
                    I agree to the <a href="#" style="color:var(--accent)">Terms of Service</a> and
                    <a href="#" style="color:var(--accent)">Privacy Policy</a>
                </label>
            </div>

            <button type="submit" class="btn btn-primary btn-full btn-lg">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </form>

        <p class="auth-link" style="margin-top:1.25rem">Already have an account? <a href="/login">Sign in</a></p>
    </div>
</div>
</th:block>
<th:block th:fragment="extra-scripts">
<style>
.pw-bar{flex:1;height:3px;border-radius:2px;background:var(--border);transition:background .3s}
.pw-bar.weak{background:#ff4d6d}
.pw-bar.fair{background:var(--yellow)}
.pw-bar.good{background:var(--accent)}
.pw-bar.strong{background:var(--accent3)}
</style>
<script>
function toggleRegPw() {
    const inp = document.getElementById('regPw');
    const eye = document.getElementById('regPwEye');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    eye.className = inp.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
}

document.getElementById('regPw')?.addEventListener('input', function() {
    const v = this.value;
    const bars = document.querySelectorAll('.pw-bar');
    bars.forEach(b => b.className = 'pw-bar');
    let score = 0;
    if (v.length >= 8) score++;
    if (/[A-Z]/.test(v)) score++;
    if (/[0-9]/.test(v)) score++;
    if (/[^A-Za-z0-9]/.test(v)) score++;
    const cls = ['weak','fair','good','strong'];
    for (let i = 0; i < score; i++) bars[i].classList.add(cls[score-1]);
});

document.getElementById('regPw2')?.addEventListener('input', function() {
    const match = this.value === document.getElementById('regPw').value;
    document.getElementById('pwMatchErr').style.display = this.value && !match ? 'flex' : 'none';
    this.style.borderColor = this.value ? (match ? 'var(--accent3)' : 'var(--accent2)') : '';
});

function validateRegister(e) {
    const pw = document.getElementById('regPw').value;
    const pw2 = document.getElementById('regPw2').value;
    if (pw !== pw2) {
        e.preventDefault();
        document.getElementById('pwMatchErr').style.display = 'flex';
        return false;
    }
    return true;
}
</script>
</th:block>
</body>
</html>
